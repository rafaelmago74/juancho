<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juancho 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- PANTALLA DE BIENVENIDA (SPLASH SCREEN) -->
    <div id="splash-screen" onclick="entrarSitio()">
        <div class="splash-content">
            <h1>Juancho 2026</h1>
            <p>Click para entrar</p>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="main-content" class="hidden">
        <header>
            <h1>Integrantes</h1>
        </header>

        <main class="container">
            
            <!-- CONTENEDOR DE INTEGRANTES ACTIVOS (ARRIBA) -->
            <div class="bloque-principal">
                
                <!-- TARJETA DE BANCHO -->
                <div class="card" onclick="abrirModal('modal-bancho')">
                    <img src="perfilpancho.jpg" alt="" class="foto-perfil">
                    <h2>Bancho</h2>
                    <p>Click para ver fotos</p>
                </div>

                <!-- TARJETA DE BIRO -->
                <div class="card" onclick="abrirModal('modal-biro')">
                    <img src="perfilbiro.jpg" alt="" class="foto-perfil">
                    <h2>Biro</h2>
                    <p>Click para ver fotos</p>
                </div>

            </div>

            <!-- CARTEL GIGANTE BAJO LOS PERFILES ACTIVOS -->
            <div class="separador-bizarro">
                <span class="texto-loco">PRÓXIMAMENTE</span>
            </div>

            <!-- CONTENEDOR DE LOS DEMÁS INTEGRANTES ORDENADOS -->
            <div class="bloque-proximos">
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Chino</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Totiapijuda</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Marto</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Elgimenez</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Valerio</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Plim</h2></div>
                <div class="card prox"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop" alt="?" class="foto-perfil"><h2>Arbol</h2></div>
            </div>
        </main>
    </div>

    <!-- VENTANA MODAL DE LA GALERÍA DE BANCHO (AHORA CON 7 FOTOS) -->
    <div id="modal-bancho" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal('modal-bancho')">&times;</span>
            <h2>Fotos de Bancho</h2>
            <div class="grid-galeria">
                <img src="bancho1.jpg" alt="Foto 1" onclick="abrirLightbox(this.src)">
                <img src="bancho2.jpg" alt="Foto 2" onclick="abrirLightbox(this.src)">
                <img src="bancho3.jpg" alt="Foto 3" onclick="abrirLightbox(this.src)">
                <img src="bancho4.jpg" alt="Foto 4" onclick="abrirLightbox(this.src)">
                <img src="bancho5.jpg" alt="Foto 5" onclick="abrirLightbox(this.src)">
                <img src="bancho6.jpg" alt="Foto 6" onclick="abrirLightbox(this.src)">
                <!-- Agregada la nueva foto de Bancho -->
                <img src="bancho7.jpg" alt="Foto 7" onclick="abrirLightbox(this.src)">
            </div>
        </div>
    </div>

    <!-- VENTANA MODAL DE LA GALERÍA DE BIRO (SÓLO LAS SUYAS) -->
    <div id="modal-biro" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal('modal-biro')">&times;</span>
            <h2>Fotos de Biro</h2>
            <div class="grid-galeria">
                <!-- Únicamente sus fotos reales -->
                <img src="biro1.jpg" alt="Biro 1" onclick="abrirLightbox(this.src)">
                <img src="biro2.jpg" alt="Biro 2" onclick="abrirLightbox(this.src)">
            </div>
        </div>
    </div>

    <!-- VENTANA LIGHTBOX (ZOOM) -->
    <div id="lightbox" class="lightbox hidden" onclick="cerrarLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="img-lightbox" src="" alt="Zoom">
    </div>

    <!-- LÓGICA EN JAVASCRIPT -->
    <script>
        function entrarSitio() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            splash.classList.add('fade-out');
            setTimeout(() => {
                splash.style.display = 'none';
                main.classList.remove('hidden');
                main.classList.add('fade-in');
            }, 500);
        }

        function abrirModal(idModal) {
            document.getElementById(idModal).classList.remove('hidden');
        }
        function cerrarModal(idModal) {
            document.getElementById(idModal).classList.add('hidden');
        }

        function abrirLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('img-lightbox');
            img.src = src;
            lightbox.classList.remove('hidden');
        }
        function cerrarLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }
    </script>
</body>
</html>
