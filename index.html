<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juancho 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- PANTALLA DE BIENVENIDA (SPLASH SCREEN) -->
    <div id="splash-screen" onclick="entrarSitio()">
        <div class="splash-content">
            <h1>Juancho 2026</h1>
            <p>Click para entrar</p>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL (OCULTO AL PRINCIPIO) -->
    <div id="main-content" class="hidden">
        <header>
            <h1>Integrantes</h1>
        </header>

        <main class="container">
            <!-- TARJETA DE PANCHO -->
            <div class="card" onclick="abrirModal()">
                <div class="card-avatar">👤</div>
                <h2>Pancho</h2>
                <p>Click para ver fotos</p>
            </div>
        </main>
    </div>

    <!-- VENTANA MODAL DE LA GALERÍA DE PANCHO -->
    <div id="modal-galeria" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h2>Fotos de Pancho</h2>
            <div class="grid-galeria">
                <!-- Se asume que las fotos se llaman exactamente así en tu GitHub -->
                <img src="pancho1.jpg" alt="Pancho 1" onclick="abrirLightbox(this.src)">
                <img src="pancho2.jpg" alt="Pancho 2" onclick="abrirLightbox(this.src)">
                <img src="pancho3.jpg" alt="Pancho 3" onclick="abrirLightbox(this.src)">
                <img src="pancho4.jpg" alt="Pancho 4" onclick="abrirLightbox(this.src)">
                <img src="pancho5.jpg" alt="Pancho 5" onclick="abrirLightbox(this.src)">
            </div>
        </div>
    </div>

    <!-- VENTANA LIGHTBOX (ZOOM DE FOTO EN PANTALLA COMPLETA) -->
    <div id="lightbox" class="lightbox hidden" onclick="cerrarLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="img-lightbox" src="" alt="Zoom">
    </div>

    <!-- LÓGICA EN JAVASCRIPT -->
    <script>
        // Función para desaparecer la bienvenida y mostrar la web
        function entrarSitio() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            
            splash.classList.add('fade-out');
            setTimeout(() => {
                splash.style.display = 'none';
                main.classList.remove('hidden');
                main.classList.add('fade-in');
            }, 500); // Espera que termine la animación de desvanecimiento
        }

        // Funciones para el Modal de Pancho
        function abrirModal() {
            document.getElementById('modal-galeria').classList.remove('hidden');
        }
        function cerrarModal() {
            document.getElementById('modal-galeria').classList.add('hidden');
        }

        // Funciones para el Zoom de las fotos (Lightbox)
        function abrirLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('img-lightbox');
            img.src = src;
            lightbox.classList.remove('hidden');
        }
        function cerrarLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }
    </script>
</body>
</html>
